<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional AI Chatbot</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- SIDEBAR -->

        <div class="sidebar">

            <div class="logo">

                <h1>AI<span>Bot</span></h1>

                <p>Professional AI Assistant</p>

                <button id="clearBtn">New Chat</button>

            </div>

            <div class="info">

                <p>✔ Smart AI Responses</p>
                <p>✔ Voice Input</p>
                <p>✔ Responsive Design</p>
                <p>✔ Local Storage</p>
                <p>✔ Typing Animation</p>

            </div>

        </div>

        <!-- CHAT SECTION -->

        <div class="chat-section">

            <!-- HEADER -->

            <div class="chat-header">

                <div class="chat-title">

                    <h2>AI Assistant</h2>

                    <p>Powered by JavaScript</p>

                </div>

                <div class="status">

                    <div class="dot"></div>

                    Online

                </div>

            </div>

            <!-- CHAT BOX -->

            <div class="chat-box" id="chatBox">

                <!-- BOT MESSAGE -->

                <div class="bot-message">

                    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png">

                    <div class="message">

                        Hello 👋 <br>
                        I am your AI assistant. How can I help you today?

                    </div>

                </div>

            </div>

            <!-- INPUT AREA -->

            <div class="input-area">

                <textarea
                    id="userInput"
                    placeholder="Type your message..."
                    rows="1"
                ></textarea>

                <button id="micBtn">🎤</button>

                <button id="sendBtn">➤</button>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
